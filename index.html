<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  background: #0a0a0f;
  color: #fff;
  overflow-x: hidden;
  padding-bottom: 80px;

/* ── 背景粒子 ── */
#particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.08) 0%, transparent 70%);
  animation: float linear infinite;
}
@keyframes float {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: .6; }
  90%  { opacity: .6; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* ── 主容器 ── */
.app {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
  padding: 60px 24px 80px;
}

/* ── 标题 ── */
.hero {
  text-align: center;
  margin-bottom: 48px;
}
.hero-title {
  font-size: clamp(48px, 12vw, 96px);
  font-weight: 900;
  letter-spacing: .18em;
  line-height: 1.1;
  background: linear-gradient(135deg, #ff6b00, #ffd700, #ff4500, #ffd700, #ff6b00);
  background-size: 400% 400%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradShift 4s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 80px rgba(255,107,0,.35));
}
@keyframes gradShift {
  0%   { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
.hero-sub {
  margin-top: 20px;
  font-size: clamp(13px, 2.2vw, 17px);
  font-weight: 300;
  line-height: 1.8;
  background: linear-gradient(135deg, #ffffff, #888888, #ffffff, #aaaaaa);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradShift 5s ease-in-out infinite alternate;
  max-width: 640px;
  margin-left: auto;
  margin-right: auto;
}

/* ── 卡片网格 ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
  margin-bottom: 40px;

  cursor: pointer;
  transition: transform .35s cubic-bezier(.25,.46,.45,.94),

  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background: radial-gradient(600px circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,.06) 0%, transparent 60%);

  transition: opacity .4s;
  pointer-events: none;
}
.card:hover {
  transform: translateY(-6px) scale(1.01);
  box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.12);
}
.card:hover::before { opacity: 1; }

.card-icon {

}
.card-name {

}

/* ── 页脚 ── */

// ══════════════════════════════════════════
//  算法

// ── 云学宝典 (plain JS, use *) ──
function cloud_hash8(s) {
  let h1 = 0x811c9dc5;
  for (let i = 0; i < s.length; i++) {
    h1 ^= s.charCodeAt(i);
    h1 = (h1 + ((h1 << 1) + (h1 << 4) + (h1 << 7) + (h1 << 8) + (h1 << 24))) >>> 0;
  }
  let h2 = 0x1000193;
  for (let i = s.length - 1; i >= 0; i--) {
    h2 ^= 31 * s.charCodeAt(i);
    h2 = (0x1000193 * h2) >>> 0;
  }
  const c = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  let r = "", x = (h1 ^ h2) >>> 0;
  for (let i = 0; i < 8; i++) { r += c[x % 36]; x = (x / 36) >>> 0; }
  return r;
}
function cloud_pin(code) {
  let s = "YxStu@2026!" + code, e = 0x9e3779b9, i = 0x85ebca6b;
  for (let o = 0; o < s.length; o++) {

    i = ((i + ch) * 0x27d4eb2d) >>> 0;

  let p = String(((e ^ i) >>> 0) % 1e6);
  while (p.length < 6) p = "0" + p;
  return p;
}

// ── 验算 (bytecode, Math.imul) ──
function calc_hash5(s) {

  for (let i = s.length - 1; i >= 0; i--) { h2 ^= Math.imul(s.charCodeAt(i), 31) >>> 0; h2 = Math.imul(h2, 0x1000193) >>> 0; }
  const c = "123456789ABCDEFGHIJKLMNPQRSTUVWXYZ";
  let r = "", x = (h1 ^ h2) >>> 0;
  for (let i = 0; i < 5; i++) { r += c[x % 33]; x = (x / 33) >>> 0; }

    id: 'calc', icon: '🧮', name: '验算', pkg: 'com.yxstu.xuecalc',
    hashDesc: 'hash5 → 5位', salt: 'FreeDict@2026!RC', imul: true,
    hash: calc_hash5, pin: calc_pin
  },
  {
    id: 'gugu', icon: '🕰️', name: '咕咕钟', pkg: 'com.yxstu.rw5',
    hashDesc: 'hash7 → 7位', salt: 'GuguClock@2026!GG', imul: true,
    hash: gugu_hash7, pin: gugu_pin
  },
  {
    id: 'mao', icon: '🔱', name: '投矛大作战', pkg: 'com.yxstu.mao',
    hashDesc: 'hash4 → 4位', salt: 'FreeDict@2026!RC', imul: true,
    hash: mao_hash4, pin: mao_pin
  }
];

// ══════════════════════════════════════════
//  DOM
// ══════════════════════════════════════════
const grid = document.getElementById('cardGrid');
const overlay = document.getElementById('detailOverlay');
const backdrop = document.getElementById('detailBackdrop');
const closeBtn = document.getElementById('detailClose');
const panel = document.getElementById('detailPanel');
const title = document.getElementById('detailTitle');
const pkg = document.getElementById('detailPkg');
const input = document.getElementById('codeInput');
const calcBtn = document.getElementById('calcBtn');
const resultArea = document.getElementById('resultArea');
const rdCode = document.getElementById('rdCode');
const rdPin = document.getElementById('rdPin');

let activeProj = null;

// 渲染卡片
projects.forEach(p => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <span class="card-icon">${p.icon}</span>
    <div class="card-name">${p.name}</div>
    <div class="card-pkg">${p.pkg}</div>
    <div class="card-meta">
      <span class="tag">${p.hashDesc}</span>
      <span class="tag">${p.imul ? 'Math.imul' : 'float×'}</span>
    </div>
  `;
  card.addEventListener('click', () => openDetail(p));
  card.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    card.style.setProperty('--mx', (e.clientX - r.left) + 'px');
    card.style.setProperty('--my', (e.clientY - r.top) + 'px');
  });
  grid.appendChild(card);
});

// 打开详情
function openDetail(p) {
  activeProj = p;
  title.textContent = p.icon + ' ' + p.name;
  pkg.textContent = p.pkg + ' · ' + p.hashDesc;
  input.value = '';
  resultArea.classList.add('hidden');
  overlay.classList.add('open');
  setTimeout(() => input.focus(), 350);
}

function closeDetail() {
  overlay.classList.remove('open');
}

backdrop.addEventListener('click', closeDetail);
closeBtn.addEventListener('click', closeDetail);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

// 计算
calcBtn.addEventListener('click', () => {
  if (!activeProj) return;
  const raw = input.value.trim();
  if (!raw) { input.focus(); return; }

  const proj = activeProj;
  const charset = proj.id === 'cloud' ? '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'
               : proj.id === 'calc' ? '123456789ABCDEFGHIJKLMNPQRSTUVWXYZ'
               : proj.id === 'gugu' ? '@23456789ABCDEFGHJKLMNOPRSTUVWXYZ'
               : 'D123456789ABCDEFGHIJKLMNPQRSTUVWXYZ';

  const looksLikeCode = [...raw].every(ch => charset.includes(ch));

  let finalCode, password;
  if (looksLikeCode && raw.length >= 4) {
    finalCode = raw;
    password = proj.pin(raw);
  } else {
    finalCode = proj.hash(raw);
    password = proj.pin(finalCode);
  }

  rdCode.textContent = finalCode;
  rdPin.textContent = password;
  resultArea.classList.remove('hidden');
});

// 回车触发计算
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') calcBtn.click();
});

// ══════════════════════════════════════════
//  罪证画廊
// ══════════════════════════════════════════
const galOverlay = document.getElementById('galleryOverlay');
const galBackdrop = document.getElementById('galleryBackdrop');
const galClose = document.getElementById('galleryClose');
const navEvidence = document.getElementById('navEvidence');

navEvidence.addEventListener('click', () => {
  galOverlay.classList.add('open');
});
galBackdrop.addEventListener('click', () => {
  galOverlay.classList.remove('open');
});
galClose.addEventListener('click', () => {
  galOverlay.classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    galOverlay.classList.remove('open');
    closeDetail();
  }
});

// ══════════════════════════════════════════
//  粒子背景
// ══════════════════════════════════════════
(function initParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 35; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const size = 2 + Math.random() * 4;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = Math.random() * 100 + '%';
    el.style.animationDuration = (12 + Math.random() * 28) + 's';
    el.style.animationDelay = (Math.random() * 20) + 's';
    container.appendChild(el);
  }
})();
</script>
</body>
</html>
